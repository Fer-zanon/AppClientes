services:
  api:
    build:
      context: ./api
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - postgres

  client:
    build:
      context: ./client
    ports:
      - "5173:5173"
    depends_on:
      - api

  postgres:
    image: postgres:16
    container_name: appclientes-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: appclientes
      POSTGRES_USER: appclientes_user
      POSTGRES_PASSWORD: appclientes_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: